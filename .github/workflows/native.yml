name: Native Core

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: rust-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025, macos-15]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Format
        run: cargo fmt --check --manifest-path native/core/Cargo.toml
      - name: Test
        run: cargo test --manifest-path native/core/Cargo.toml

  maturin-smoke:
    name: maturin-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
          - os: ubuntu-24.04-arm
          - os: windows-2025
          - os: windows-11-arm
          - os: macos-13
          - os: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install maturin
        run: python -m pip install -U pip maturin
      - name: Build native wheel
        run: maturin build --manifest-path native/core/Cargo.toml --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: native-wheel-${{ matrix.os }}
          path: dist/*
