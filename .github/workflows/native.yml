name: Native Core

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: rust-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025, macos-15]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Format
        run: cargo fmt --check --manifest-path native/core/Cargo.toml
      - name: Test
        run: cargo test --manifest-path native/core/Cargo.toml --no-default-features

  maturin-smoke:
    name: maturin-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
          - os: ubuntu-24.04-arm
          - os: windows-2025
          - os: windows-11-arm
          - os: macos-15-intel
          - os: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install maturin
        run: python -m pip install -U pip maturin
      - name: Build native wheel
        run: maturin build --manifest-path native/core/Cargo.toml --release --out dist --features extension-module
      - name: Install simulator and native wheel
        run: |
          python -m pip install -e "./python[dev]"
          python -c "from pathlib import Path; import subprocess, sys; wheels=sorted(Path('dist').glob('blackhole_native-*.whl')); assert wheels, 'no blackhole_native wheel produced'; subprocess.check_call([sys.executable, '-m', 'pip', 'install', '--force-reinstall', str(wheels[-1])])"
      - name: Native wheel doctor
        run: |
          python -c "import blackhole_native, json; info=blackhole_native.detect_arch(); print(json.dumps({'version': blackhole_native.core_version(), 'arch': info}, sort_keys=True)); assert info.get('arch') in {'arm64', 'x86_64', 'x86'}"
          blackhole-accelerators doctor --json --fail-on-emulation
      - name: Native parity regression
        run: python -m pytest -q python/tests/test_native_stokes_parity.py python/tests/test_native_sampler_parity.py
      - uses: actions/upload-artifact@v4
        with:
          name: native-wheel-${{ matrix.os }}
          path: dist/*
