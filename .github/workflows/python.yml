name: Python

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    name: python-${{ matrix.os }}-${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025, macos-15]
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -U pip && python -m pip install -e .[dev]
      - name: Compile
        run: python -m compileall blackhole_sim
      - name: Test
        run: python -m pytest -q
      - name: Accelerator doctor
        run: blackhole-accelerators doctor --json --fail-on-emulation
